version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NEXIS_BIND_ADDR=0.0.0.0:8080
      - NEXIS_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # For future use
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=nexis
      - POSTGRES_PASSWORD=nexis_dev
      - POSTGRES_DB=nexis
    ports:
      - "5432:5432"
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - with-db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    profiles:
      - with-cache

volumes:
  postgres_data:
  redis_data:
